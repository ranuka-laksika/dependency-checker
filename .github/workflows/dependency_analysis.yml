name: Claude Code â€˘ Dependency Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  analyze-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Configure git
        run: |
          git config user.name "${{ secrets.DEPENDENCY_CHECKER_GIT_USER_NAME }}"
          git config user.email "${{ secrets.DEPENDENCY_CHECKER_GIT_USER_EMAIL }}"

      - name: Get PR number
        id: get_pr
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Analyzing PR #$PR_NUMBER"

      - name: Prepare system prompt with environment variables
        id: prepare_prompt
        run: |
          # Install envsubst if not available
          if ! command -v envsubst &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y gettext-base
          fi

          # Set environment variables
          export PR_NUMBER="${{ steps.get_pr.outputs.pr_number }}"
          export REPOSITORY="${{ github.repository }}"
          export ISSUE_NUMBER="${{ steps.get_pr.outputs.pr_number }}"

          # Substitute variables in system prompt
          SYSTEM_PROMPT=$(envsubst < ${{ github.workspace }}/.github/claude/system_prompt.txt)

          # Save to GitHub environment
          echo "SYSTEM_PROMPT<<EOF" >> $GITHUB_ENV
          echo "$SYSTEM_PROMPT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "REPOSITORY=$REPOSITORY" >> $GITHUB_ENV
          echo "ISSUE_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

          echo "âś… System prompt prepared for PR #$PR_NUMBER"

      - name: Run Claude Dependency Analysis
        id: run_claude
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ steps.get_pr.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.get_pr.outputs.pr_number }}
        with:
          anthropic_api_key: ${{ secrets.DEPENDENCY_CHECKER_ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.DEPENDENCY_CHECKER_GITHUB_TOKEN }}
          prompt: ${{ env.SYSTEM_PROMPT }}
          claude_args: |
            --allowedTools "WebFetch,mcp__github__get_pull_request,mcp__github__get_file_contents,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__list_commits,mcp__github__search_code,Bash(go:*),Bash(git:*),Read"
            --model claude-sonnet-4-5-20250929

      - name: Analysis complete
        run: |
          echo "âś… Dependency analysis completed for PR #${{ steps.get_pr.outputs.pr_number }}"
          echo "Check the PR comments for the detailed analysis report"
